use_default_settings: true
server:
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: false
  image_proxy: true
ui:
  static_use_hash: true
search:
  safe_search: 0
  autocomplete: ''
  default_lang: en
engines:
  - name: google
    engine: google
    use_mobile_ui: false
  - name: bing
    engine: bing
  - name: duckduckgo
    engine: duckduckgo
  - name: github
    engine: github
  - name: stackoverflow
    engine: stackoverflow
  - name: arxiv
    engine: arxiv
  - name: wikipedia
    engine: wikipedia
